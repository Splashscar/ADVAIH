<div class="register-container">

    <div class="left-panel">

        <h1>ADVAIH</h1>

        <h2>
            Publica tus eventos y llega
            a miles de personas.
        </h2>

    </div>

    <div class="right-panel">

        <div class="header">

            <span>
                ¿Ya tienes cuenta?
            </span>

            <a routerLink="/">
                Inicia sesión
            </a>

        </div>

        <h1>
            Crea tu cuenta
        </h1>

        <p>
            Comparte tus eventos y haz crecer tu comunidad.
        </p>

        <div class="grid">

            <input
                type="text"
                placeholder="Nombre completo"
                [(ngModel)]="nombre">

            <input
                type="email"
                placeholder="Correo electrónico"
                [(ngModel)]="email">

            <input
                type="password"
                placeholder="Contraseña"
                [(ngModel)]="password">

            <input
                type="password"
                placeholder="Confirmar contraseña"
                [(ngModel)]="confirmarPassword">

        </div>

        <textarea placeholder="Descripción de tu organizador"></textarea>

        <button (click)="registrar()">
            Crear cuenta
        </button>
        <p (click)="registrar()">   
            HAZ CLICK AQUI
        </p>

    </div>

</div>
