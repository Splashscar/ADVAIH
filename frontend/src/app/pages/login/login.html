<div class="login-container">

    <div class="left-panel">
        <div class="brand">

            <h1>ADVAIH</h1>

            <p class="subtitle">
                A Donde Vamos A Ir Hoy
            </p>

            <div class="line"></div>

            <h2>
                Encuentra <span>planes</span>,
                vive <span>experiencias</span>.
            </h2>

        </div>
    </div>

    <div class="right-panel">

        <div class="top-link">
            <span>¿No tienes cuenta?</span>

            <a routerLink="/register">
                Regístrate
            </a>
        </div>

        <div class="form-box">

            <h1>¡Bienvenido de nuevo! 👋</h1>

            <p>
                Inicia sesión para continuar disfrutando
                los mejores eventos y planes.
            </p>

            <label>Correo electrónico</label>

            <input
                type="email"
                placeholder="ejemplo@correo.com"
                [(ngModel)]="email">


            <label>Contraseña</label>

            <input
                type="password"
                placeholder="••••••••"
                [(ngModel)]="password">

            <a class="forgot">
                ¿Olvidaste tu contraseña?
            </a>

            <button (click)="loginEmail()">
                Iniciar sesión
            </button>

            <div class="separator">
                <span>o continúa con</span>
            </div>

        <button type="button" class="google-btn" (click)="loginGoogle()">
            Continuar con Google
        </button>

            <button class="facebook-btn">
                Continuar con Facebook
            </button>

        </div>

    </div>

</div>
