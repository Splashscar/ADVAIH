<div class="home-container">

    

<app-navbar></app-navbar>
    <div class="bienvenida" *ngIf="nombreUsuario">

        <h2>
             Bienvenido,
            {{ nombreUsuario }}
        </h2>

        <p>
            Nos alegra tenerte nuevamente en ADVAIH.
        </p>

    </div>
    

    <!-- EVENTOS DESTACADOS -->
    <section class="eventos-section">

        <h2>Eventos Destacados</h2>

        <div class="eventos-grid">

            <div class="evento-card">
                <img src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f"
                    alt="Evento">

                <div class="evento-info">
                    <h3>Festival Electrónico</h3>
                    <p>Bogotá • 20 Junio</p>
                    <button>Ver más</button>
                </div>
            </div>

            <div class="evento-card">
                <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819"
                    alt="Evento">

                <div class="evento-info">
                    <h3>Concierto Urbano</h3>
                    <p>Medellín • 25 Junio</p>
                    <button>Ver más</button>
                </div>
            </div>

            <div class="evento-card">
                <img src="https://s3.summerfest.com/assets/images/stages/2024/generac/Generac-hero2000x1333.jpg"
                    alt="Evento">

                <div class="evento-info">
                    <h3>Summer Fest</h3>
                    <p>Cali • 28 Junio</p>
                    <button>Ver más</button>
                </div>
            </div>

        </div>

    </section>

</div>
