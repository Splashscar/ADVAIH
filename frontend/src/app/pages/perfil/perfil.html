<div class="home-container">

    <!-- HERO AL ESTILO HOME -->
    <header class="hero">
        <h1>MI PERFIL</h1>
        <p>Gestiona tus datos de ADVAIH</p>
    </header>
    
    <!-- ACCIÓN DE VOLVER AL INICIO -->
    <div class="top-actions">
        <button routerLink="/home" class="btn-crear-evento">
            ⬅️ Volver al Inicio
        </button>
    </div>

    <!-- SECCIÓN PRINCIPAL CONFIGURADA COMO EL GRID DEL HOME -->
    <section class="eventos-section">
        <div class="eventos-grid" style="grid-template-columns: 1fr; max-width: 600px; margin: 0 auto;">

            <!-- REUTILIZAMOS LA ESTRUCTURA DE TARJETA 'EVENTO-CARD' -->
            <div class="evento-card">
                
                <!-- AVATAR / FOTO DE PERFIL -->
                <div style="position: relative; text-align: center; padding: 20px 0; background: rgba(255,255,255,0.02);">
                    <img [src]="fotoUrl" alt="Foto de perfil" 
                         style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 2px solid #7c3aed; margin: 0 auto; cursor: pointer;"
                         (click)="editando && estaLogueado && fileInput.click()">
                    
                    <input type="file" #fileInput style="display: none;" accept="image/*" (change)="onFotoSeleccionada($event)">
                    
                    <h3 style="margin: 10px 0 2px 0; color: white;">{{ nombre }}</h3>
                    <p style="margin: 0; font-size: 14px; color: #a0aec0;">{{ email }} • <strong>{{ rol }}</strong></p>
                </div>

                <!-- CONTENEDOR DE CAMPOS (ESTILO EVENTO-INFO) -->
                <div class="evento-info" style="text-align: left; display: flex; flex-direction: column; gap: 15px;">
                    
                    <!-- Campo Nombre -->
                    <div>
                        <label style="display:block; font-size: 12px; color: #a0aec0; margin-bottom: 4px;">Nombre Completo</label>
                        <input type="text" [(ngModel)]="nombre" [disabled]="!editando" 
                               style="width: 100%; background: #1a203e; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 6px; padding: 10px; color: white;">
                    </div>

                    <!-- Fila de Teléfono y Ciudad -->
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div>
                            <label style="display:block; font-size: 12px; color: #a0aec0; margin-bottom: 4px;">Teléfono</label>
                            <input type="text" [(ngModel)]="telefono" [disabled]="!editando" placeholder="Ej: +57 300..."
                                   style="width: 100%; background: #1a203e; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 6px; padding: 10px; color: white;">
                        </div>
                        <div>
                            <label style="display:block; font-size: 12px; color: #a0aec0; margin-bottom: 4px;">Ciudad</label>
                            <input type="text" [(ngModel)]="ciudad" [disabled]="!editando" placeholder="Ej: Bogotá"
                                   style="width: 100%; background: #1a203e; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 6px; padding: 10px; color: white;">
                        </div>
                    </div>

                    <!-- Campo Biografía -->
                    <div>
                        <label style="display:block; font-size: 12px; color: #a0aec0; margin-bottom: 4px;">Biografía Breve</label>
                        <textarea [(ngModel)]="biografia" [disabled]="!editando" placeholder="Cuéntanos sobre ti..." rows="3"
                                  style="width: 100%; background: #1a203e; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 6px; padding: 10px; color: white; font-family: inherit; resize: none;"></textarea>
                    </div>

                    <!-- Miembro Desde (Informativo) -->
                    <div>
                        <label style="display:block; font-size: 12px; color: #64748b; margin-bottom: 4px;">Miembro Desde</label>
                        <input type="text" [value]="fechaRegistro" disabled 
                               style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 6px; padding: 10px; color: #64748b; cursor: not-allowed;">
                    </div>

                    <!-- 🔒 CONTROL DE BLOQUEO DE EDICIÓN NATIVO -->
                    <div style="margin-top: 10px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.08);">
                        
                        <!-- CASO: NO REGISTRADO / OTRO NAVEGADOR -->
                        <div *ngIf="!estaLogueado" style="color: #ef4444; font-size: 13px; text-align: center; font-weight: 500;">
                            🔒 Regístrate o inicia sesión en este navegador para modificar estos campos.
                        </div>

                        <!-- CASO: LOGUEADO EXPOSITOR DE BOTÓN VER MÁS -->
                        <div *ngIf="estaLogueado">
                            <button *ngIf="!editando" (click)="editando = true" class="btn-ver-mas">
                                ✏️ Editar Perfil
                            </button>
                            
                            <div *ngIf="editando" style="display: flex; gap: 10px;">
                                <button (click)="guardarCambios()" class="btn-ver-mas" style="background: linear-gradient(90deg, #10b981, #059669);">
                                    💾 Guardar
                                </button>
                                <button (click)="editando = false" class="btn-ver-mas" style="background: #374151;">
                                    ❌ Cancelar
                                </button>
                            </div>
                        </div>

                    </div>

                </div>
            </div>

        </div>
    </section>

</div>
