<div class="perfil-container">

    <header class="hero-perfil">
        <div class="avatar-wrapper" [class.editable]="editando" (click)="editando && fileInput.click()">
            <img [src]="usuario.fotoUrl" alt="Foto de perfil" class="avatar-img">
            
            <div class="avatar-overlay" *ngIf="editando">
                <span>📷 Cambiar</span>
            </div>
        </div>

        <input type="file" #fileInput style="display: none;" accept="image/*" (change)="onFotoSeleccionada($event)">

        <h1>{{ usuario.nombre || 'Nombre de Usuario' }}</h1>
        <p>{{ usuario.email || 'correo@ejemplo.com' }}</p>
        <span class="badge-rol">{{ usuario.rol || 'Usuario' }}</span>
    </header>

    <section class="perfil-section">
        
        <div class="perfil-grid">
            
            <div class="perfil-card">
                <div class="perfil-info-header">
                    <h3>Datos Personales</h3>
                </div>
                
                <div class="perfil-body">
                    <div class="form-group">
                        <label>Nombre Completo</label>
                        <input type="text" [(ngModel)]="usuario.nombre" [disabled]="!editando" placeholder="Tu nombre">
                    </div>

                    <div class="form-group">
                        <label>Correo Electrónico</label>
                        <input type="email" [value]="usuario.email" disabled class="input-disabled">
                    </div>

                    <div class="form-group">
                        <label>Miembro Desde</label>
                        <input type="text" [value]="usuario.fechaRegistro" disabled class="input-disabled">
                    </div>

                    <div class="perfil-actions">
                        <button *ngIf="!editando" (click)="editando = true" class="btn-editar-perfil">
                            ✏️ Editar Perfil
                        </button>
                        
                        <div *ngIf="editando" class="btn-group-acciones">
                            <button (click)="guardarCambios()" class="btn-guardar">💾 Guardar Cambios</button>
                            <button (click)="editando = false" class="btn-cancelar">❌ Cancelar</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="perfil-card">
                <div class="perfil-info-header">
                    <h3>Mis Estadísticas</h3>
                </div>
                <div class="perfil-body stats-flex">
                    <div class="stat-box">
                        <span class="stat-number">12</span>
                        <span class="stat-label">Eventos Asistidos</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-number">4</span>
                        <span class="stat-label">Favoritos</span>
                    </div>
                </div>
            </div>

        </div>

    </section>

</div>
